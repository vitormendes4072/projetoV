## render.yaml — Infraestrutura como código para Render.com
##
## Referência: https://render.com/docs/blueprint-spec
## Para ativar: conecte o repositório em dashboard.render.com → "New Blueprint"

services:
  # ── Web (gunicorn) ────────────────────────────────────────────────────────
  - type: web
    name: ventregaz-web
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn "app:create_app()" --workers 2 --bind 0.0.0.0:$PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: CREDENTIALS_ENCRYPTION_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: ventregaz-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: ventregaz-redis
          type: redis
          property: connectionString
      - key: MAIL_SERVER
        sync: false
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: SENTRY_DSN
        sync: false

  # ── RQ Worker (sync Amazon assíncrono) ───────────────────────────────────
  - type: worker
    name: ventregaz-worker
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m rq worker amazon-sync --url $REDIS_URL
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: ventregaz-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: ventregaz-redis
          type: redis
          property: connectionString
      - key: CREDENTIALS_ENCRYPTION_KEY
        sync: false
      - key: SENTRY_DSN
        sync: false

  # ── Cron — sync Amazon diário (03:00 UTC) ────────────────────────────────
  - type: cron
    name: ventregaz-daily-sync
    runtime: python
    buildCommand: pip install -r requirements.txt
    schedule: "0 3 * * *"
    command: flask amazon-daily-sync --days 1
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: ventregaz-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: ventregaz-redis
          type: redis
          property: connectionString
      - key: CREDENTIALS_ENCRYPTION_KEY
        sync: false

  # ── Cron — alertas de margem baixa (07:00 UTC) ───────────────────────────
  - type: cron
    name: ventregaz-margin-alerts
    runtime: python
    buildCommand: pip install -r requirements.txt
    schedule: "0 7 * * *"
    command: flask send-margin-alerts
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: ventregaz-db
          property: connectionString
      - key: MAIL_SERVER
        sync: false
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false

  # ── Cron — relatório semanal de prejuízo (segundas 08:00 UTC) ───────────
  - type: cron
    name: ventregaz-weekly-report
    runtime: python
    buildCommand: pip install -r requirements.txt
    schedule: "0 8 * * 1"
    command: flask send-weekly-report
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: ventregaz-db
          property: connectionString
      - key: MAIL_SERVER
        sync: false
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false

  # ── Redis ─────────────────────────────────────────────────────────────────
  - type: redis
    name: ventregaz-redis
    plan: free

databases:
  - name: ventregaz-db
    plan: free
