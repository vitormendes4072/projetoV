name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [develop, main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar ruff
        run: pip install ruff==0.11.11

      - name: Verificar lint
        run: ruff check .

  mypy:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Verificar tipos (service layer)
        run: mypy
        env:
          APP_ENV: testing

  test:
    name: Tests + Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Rodar testes com cobertura
        run: python -m pytest tests/ --cov=app --cov-report=term-missing --cov-report=xml --cov-fail-under=60
        env:
          APP_ENV: testing

      - name: Upload coverage para Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          fail_ci_if_error: false

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: test
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ventregaz_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Instalar Chromium do Playwright
        run: python -m playwright install --with-deps chromium

      - name: Rodar testes E2E (sem cobertura, schema completo Postgres)
        run: python -m pytest tests/e2e/ -m e2e --no-cov -v
        env:
          APP_ENV: testing
          TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ventregaz_test

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t marketplace-manager:ci .
