name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [develop, main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar ruff
        run: pip install ruff==0.11.11

      - name: Verificar lint
        run: ruff check .

  test:
    name: Tests + Coverage
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('requirements.txt') }}
          restore-keys: pip-

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Rodar testes com cobertura
        run: python -m pytest tests/ --cov=app --cov-report=term-missing --cov-fail-under=60
        env:
          APP_ENV: testing
          TEST_DATABASE_URL: postgresql://test:test@localhost:5432/testdb

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t marketplace-manager:ci .
