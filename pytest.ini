[pytest]
testpaths = tests
addopts = --cov=app --cov-report=term-missing --cov-fail-under=60 -m "not e2e"
markers =
    e2e: end-to-end browser tests (Playwright). Excluded por padrão; rode com `pytest -m e2e tests/e2e/`.
    requires_postgres: requer Postgres real (usa schema="public"). Pulado em SQLite.
