<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muitas Tentativas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f9fafb; /* Cor de fundo mais suave */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px; /* Espaçamento para telas pequenas */
        }
        .card {
            background: white;
            padding: 2.5rem;
            border-radius: 16px; /* Bordas mais arredondadas */
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.01); /* Sombra mais suave e moderna */
            text-align: center;
            max-width: 420px;
            width: 100%;
            border-top: 4px solid #ef4444; /* Linha vermelha de alerta no topo */
        }
        .icon-container {
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: center;
        }
        /* Estilo do SVG */
        .security-icon {
            width: 64px;
            height: 64px;
            color: #2563eb; /* Cor azul para combinar com o botão */
        }
        h1 {
            color: #111827; /* Cor de texto quase preta */
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1rem;
            margin-top: 0;
        }
        p {
            color: #4b5563; /* Cor de texto cinza escuro */
            line-height: 1.6;
            margin-bottom: 1.5rem;
        }
        .alert-box {
            background-color: #fef2f2; /* Fundo vermelho bem claro */
            color: #991b1b; /* Texto vermelho escuro */
            padding: 1rem;
            border-radius: 8px;
            font-size: 0.95rem;
            margin-bottom: 2rem;
            border: 1px solid #fee2e2;
        }
        .btn {
            display: inline-block;
            width: 100%; /* Botão de largura total */
            padding: 0.875rem;
            background-color: #2563eb; /* Azul vibrante */
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: background-color 0.2s;
            box-sizing: border-box; /* Garante que o padding não aumente a largura total */
        }
        .btn:hover {
            background-color: #1d4ed8; /* Azul um pouco mais escuro ao passar o mouse */
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon-container">
            <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#000000" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="security-icon">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
        </div>
        <h1>Muitas tentativas de acesso</h1>
        <p>Detectamos várias tentativas falhas vindas do seu IP. Para a segurança da sua conta, bloqueamos o acesso temporariamente.</p>
        
        <div class="alert-box">
            Tente novamente em <strong>1 minuto</strong>.
        </div>
        
        <a href="/login" class="btn">Voltar para Login</a>
    </div>
</body>
</html>
