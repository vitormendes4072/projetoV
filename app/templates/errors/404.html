{% extends "base.html" %}

{% block title %}VEntregaz - Página não encontrada{% endblock %}

{% block content %}
<div class="flex flex-col items-center justify-center min-h-[60vh] gap-6 py-12 text-center">

  <p class="text-[#0d80f2] text-8xl font-black leading-none tracking-tight">404</p>

  <div class="flex flex-col gap-2">
    <h1 class="text-[#0d141c] text-2xl font-bold">Página não encontrada</h1>
    <p class="text-[#49739c] text-sm max-w-sm">
      O endereço que você tentou acessar não existe ou foi movido.
    </p>
  </div>

  <a href="{{ url_for('main.index') }}"
    class="mt-2 h-10 px-6 rounded-lg bg-[#0d80f2] text-white text-sm font-bold hover:bg-blue-600 transition-colors flex items-center gap-2">
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" />
    </svg>
    Voltar ao início
  </a>

</div>
{% endblock %}
