<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="VEntregaz">
  <!-- Rounded square background — primary brand blue -->
  <rect width="48" height="48" rx="10" fill="#0d80f2"/>

  <!-- Bold white V
       Left arm:  top-left (6,8)→(15,8), converges to tip (24,40)
       Right arm: top-right (33,8)→(42,8), converges to tip (24,40)
       Inner notch at (24,28) gives the V its open shape -->
  <path d="M6 8 L15 8 L24 28 L33 8 L42 8 L24 40 Z" fill="white"/>

  <!-- Subtle depth on the right arm: slightly darker, suggests direction/motion -->
  <path d="M24 28 L33 8 L42 8 L24 40 Z" fill="black" fill-opacity="0.09"/>

  <!-- Speed lines — two short strokes beside the V tip, "delivery in motion" -->
  <line x1="28" y1="35" x2="34" y2="35" stroke="white" stroke-width="2" stroke-linecap="round" stroke-opacity="0.55"/>
  <line x1="30" y1="39" x2="35" y2="39" stroke="white" stroke-width="2" stroke-linecap="round" stroke-opacity="0.35"/>
</svg>
